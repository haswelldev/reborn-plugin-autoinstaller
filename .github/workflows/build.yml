name: Build Windows Installer

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest        # Linux has a working makensis
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-mingw-w64-x86-64 nsis

      - name: Install rsrc
        run: go install github.com/akavel/rsrc@latest

      - name: Embed manifest + icon
        run: |
          $(go env GOPATH)/bin/rsrc \
            -manifest app.manifest \
            -ico resources/icon.ico \
            -o rsrc.syso

      - name: Build Windows exe
        env:
          CC: x86_64-w64-mingw32-gcc
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "1"
        run: |
          mkdir -p dist
          go build \
            -ldflags="-H windowsgui -s -w" \
            -o dist/reborn-plugin-autoinstaller.exe \
            .

      - name: Build NSIS installer
        run: makensis installer.nsi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/
