name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # required to create GitHub Releases

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-mingw-w64-x86-64 nsis

      - name: Install rsrc
        run: go install github.com/akavel/rsrc@latest

      - name: Embed manifest + icon
        run: |
          $(go env GOPATH)/bin/rsrc \
            -manifest app.manifest \
            -ico resources/icon.ico \
            -o rsrc.syso

      - name: Build Windows exe
        env:
          CC: x86_64-w64-mingw32-gcc
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "1"
        run: |
          mkdir -p dist
          go build \
            -ldflags="-H windowsgui -s -w" \
            -o dist/reborn-plugin-autoinstaller.exe \
            .

      - name: Build NSIS installer
        run: makensis installer.nsi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Reborn Plugin Autoinstaller ${{ github.ref_name }}"
          body: |
            ## Reborn Plugin Autoinstaller ${{ github.ref_name }}

            Automatically installs your Lineage Reborn colored chat plugin after game client updates.

            ### Downloads
            | File | Description |
            |------|-------------|
            | `RebornPluginAutoinstaller-Setup.exe` | **Recommended** — installer with Start Menu & Desktop shortcuts |
            | `reborn-plugin-autoinstaller.exe` | Portable — run directly, no installation needed |

            ### First run
            On first launch the setup wizard will ask for your game folder, plugin and run mode (Click or Tray).
          files: |
            dist/reborn-plugin-autoinstaller.exe
            dist/RebornPluginAutoinstaller-Setup.exe
          fail_on_unmatched_files: true
